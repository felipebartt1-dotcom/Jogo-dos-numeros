<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- ========================= -->
    <!-- CONFIGURAÇÕES BÁSICAS     -->
    <!-- ========================= -->

    <!-- Define a codificação de caracteres -->
    <meta charset="UTF-8">

    <!-- Responsividade para dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da aba do navegador -->
    <title>Jogo do Número Secreto</title>

    <!-- ========================= -->
    <!-- ESTILOS                   -->
    <!-- ========================= -->

    <!-- Arquivo CSS principal -->
    <link rel="stylesheet" href="style.css">

    <!-- ========================= -->
    <!-- FONTES (GOOGLE FONTS)     -->
    <!-- ========================= -->

    <!-- Otimização de carregamento das fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Importação das fontes Chakra Petch e Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- ========================= -->
    <!-- CONTAINER PRINCIPAL       -->
    <!-- ========================= -->
    <div class="container">

        <!-- Conteúdo central do jogo -->
        <div class="container__conteudo">

            <!-- Imagem ilustrativa (robô) -->
            <img src="./img/robot.png" alt="robô mergulhador" class="container__imagem-robo" />

            <!-- Área de informações do jogo -->
            <div class="container__informacoes">

                <!-- Ícone decorativo -->
                <img src="./img/trophy.png" alt="ícone de troféu" />

                <!-- ========================= -->
                <!-- TEXTOS DO JOGO           -->
                <!-- ========================= -->
                <div class="container__texto">

                    <!-- Título principal -->
                    <h1>
                        Jogo do <span class="container__texto-azul">Número Secreto</span>
                    </h1>

                    <!-- Instrução para o jogador -->
                    <h1>Tente adivinhar um número entre 1 e 100</h1>
                </div>

                <!-- ========================= -->
                <!-- INPUT E BOTÃO            -->
                <!-- ========================= -->
                <div class="container__input">

                    <!-- Campo onde o usuário digita o número -->
                    <input 
                        type="number" 
                        id="chute" 
                        placeholder="Digite um número" 
                        min="1" 
                        max="100"
                    >

                    <!-- Botão para enviar o palpite -->
                    <button id="botaoChutar">Chutar</button>
                </div>

                <!-- ========================= -->
                <!-- MENSAGEM DINÂMICA        -->
                <!-- ========================= -->

                <!-- Aqui o JavaScript vai mostrar mensagens (acerto, erro, dicas, etc) -->
                <p id="mensagem"></p>

            </div>
        </div>
    </div>

    <!-- ========================= -->
    <!-- SCRIPT JAVASCRIPT         -->
    <!-- ========================= -->

    <!-- Arquivo responsável pela lógica do jogo -->
    <!-- 'defer' garante que o HTML carregue antes do JS executar -->
    <script src="app.js" defer></script>

</body>
</html>
